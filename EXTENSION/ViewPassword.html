<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe-Space</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>View Password.</h2>
        <button class="close-button" id="close-button"><i class="gg-close-r"></i></button>
        <form>
            <label for="service">Service:</label>
            <input type="text" id="service" name="service">
            <label for="username">Username:</label>
            <div class="username-container">
                <input type="text" id="username" name="username">
                <button type="button" class="copy" id="copy"><i class="fa fa-copy"></i></button>
            </div>
            <label for="password">Password:</label>
            <div class="password-container">
                <input type="password" id="password" name="password">
                <button type="button" class="copy" id="copy"><i class="fa fa-copy"></i></button>
                <button type="button" class="show-password" id="show-password"><i class="gg-eye"></i></button>
            </div>
            <button type="submit">DELETE</button>
            <button type="submit">EDIT</button>
        </form>
        <h4>SAFE-SPACE</h4>
    </div>
</body>
<script src="js/general.js"></script>
</html>
